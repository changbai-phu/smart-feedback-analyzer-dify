    - data:
        code: "import json\n\ndef main(classified_json_str: str):\n    try:\n    \
          \    cleaned = classified_json_str.strip()\n        parsed = json.loads(cleaned)\n\
          \        \n    except Exception as e:\n        return {\"result\": f\"JSON\
          \ parse error: {str(e)}\"}\n\n    items = parsed.get(\"classified_feedbacks\"\
          , [])\n\n    if not items:\n        return {\"result\": \"No feedback items\
          \ found. Check input format.\"}\n\n    total = len(items)\n    by_category\
          \ = {}\n    by_urgency = {}\n    by_sentiment = {}\n    top_urgent = []\n\
          \n    for it in items:\n        cat = it.get(\"category\", \"unknown\")\n\
          \        by_category[cat] = by_category.get(cat, 0) + 1\n\n        urg =\
          \ str(it.get(\"urgency_score\", 1))\n        by_urgency[urg] = by_urgency.get(urg,\
          \ 0) + 1\n\n        sen = it.get(\"sentiment\", \"neutral\")\n        by_sentiment[sen]\
          \ = by_sentiment.get(sen, 0) + 1\n\n        if it.get(\"urgency_score\"\
          , 0) >= 4:\n            top_urgent.append({\n                \"id\": it.get(\"\
          id\"),\n                \"text\": it.get(\"original_text\", \"\"),\n   \
          \             \"category\": cat,\n                \"urgency_score\": it.get(\"\
          urgency_score\", 0)\n            })\n\n    top_urgent = sorted(\n      \
          \  top_urgent,\n        key=lambda x: x[\"urgency_score\"],\n        reverse=True\n\
          \    )[:5]\n\n    summary = {\n        \"total_feedback\": total,\n    \
          \    \"by_category\": by_category,\n        \"by_urgency\": by_urgency,\n\
          \        \"by_sentiment\": by_sentiment,\n        \"top_urgent_examples\"\
          : top_urgent\n    }\n\n    summary_json = json.dumps(summary, indent=2)\n\
          \n    return {\"result\": summary_json}"
