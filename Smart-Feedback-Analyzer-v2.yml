    - data:
        code: "import json\n\ndef main(action_plan_text: str):\n    try:\n       \
          \ clean_text = action_plan_text.strip()\n        data = json.loads(clean_text)\n\
          \        plan = data.get(\"action_plan\", [])\n    except:\n        return\
          \ {\"readable_output\": \"Error parsing JSON. Raw output:\\n\" + action_plan_text}\n\
          \    \n    if not plan:\n        return {\"readable_output\": \"No action\
          \ items found.\"}\n    \n    md = \"## \U0001F680 Action Plan\\n\\n\"\n\
          \    md += \"| Issue | Recommended Action | Owner | Urgency | Next Step\
          \ |\\n\"\n    md += \"|-------|--------------------|-------|---------|------------|\\\
          n\"\n    for item in plan:\n        title = item.get(\"issue_summary\",\
          \ \"N/A\")\n        action = item.get(\"recommended_action\", \"N/A\")\n\
          \        owner = item.get(\"owner\", \"N/A\")\n        urgency = item.get(\"\
          urgency\", \"N/A\")\n        next_step = item.get(\"next_step\", \"N/A\"\
          )\n\n        row = f\"| {title} | {action} | {owner} | {urgency} | {next_step}\
          \ |\\n\"\n        md += row\n    \n    return {\"readable_output\": md}\n"
        code_language: python3
